<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Categorías</title>

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

    <div id="menu"></div>

    <div class="container my-4">
        <div class="card">
            <div class="card-body">

                <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-3 gap-2">
                    <h1 class="h3 mb-0">Categorías</h1>
                    <button type="button" class="btn btn-primary" id="btnMostrarFormulario">Agregar</button>
                </div>

                <div id="panelFormulario">
                    <div class="card border mb-4">
                        <div class="card-body">
                            <h2 class="h5 mb-3" id="tituloFormulario">Nueva categoría</h2>

                            <div class="row g-3">
                                <div class="col-12 col-md-3">
                                    <label for="id" class="form-label">ID</label>
                                    <input type="text" id="id" class="form-control" autocomplete="off">
                                </div>

                                <div class="col-12 col-md-4">
                                    <label for="nombre" class="form-label">Nombre</label>
                                    <input type="text" id="nombre" class="form-control" autocomplete="off">
                                </div>

                                <div class="col-12 col-md-5">
                                    <label for="descripcion" class="form-label">Descripción</label>
                                    <input type="text" id="descripcion" class="form-control" autocomplete="off">
                                </div>
                            </div>

                            <div class="d-flex gap-2 justify-content-end mt-4">
                                <button type="button" class="btn btn-success" id="btnGuardar">Guardar</button>
                                <button type="button" class="btn btn-secondary" id="btnCancelar">Cancelar</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="panelTabla">
                    <div class="table-responsive">
                        <table id="tabla" class="table table-striped table-bordered align-middle w-100">
                            <thead class="table-dark">
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre</th>
                                    <th>Descripción</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>1</td>
                                    <td>Camarón</td>
                                    <td>Productos derivados del camarón</td>
                                    <td></td>
                                </tr>
                                <tr>
                                    <td>2</td>
                                    <td>Alimento</td>
                                    <td>Alimento balanceado para cultivo</td>
                                    <td></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="js/jquery.js"></script>
    <script src="js/alerta.js"></script>
    <script src="js/jquery.dataTables.min.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/crud_categoria.js"></script>

</body>

</html>
