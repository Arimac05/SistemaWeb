<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Clientes</title>

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

    <div id="menu"></div>

    <div class="container my-4">
        <div class="card">
            <div class="card-body">

                <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-3 gap-2">
                    <h1 class="h3 mb-0">Clientes</h1>
                    <button type="button" class="btn btn-primary" id="btnMostrarFormulario">Agregar</button>
                </div>

                <div id="panelFormulario">
                    <div class="card border mb-4">
                        <div class="card-body">
                            <h2 class="h5 mb-3" id="tituloFormulario">Nuevo cliente</h2>

                            <div class="row g-3">
                                <div class="col-12 col-md-4">
                                    <label for="cedula" class="form-label">Cédula</label>
                                    <input type="text" id="cedula" class="form-control" autocomplete="off">
                                </div>

                                <div class="col-12 col-md-4">
                                    <label for="nombre" class="form-label">Nombre</label>
                                    <input type="text" id="nombre" class="form-control" autocomplete="off">
                                </div>

                                <div class="col-12 col-md-4">
                                    <label for="apellido" class="form-label">Apellido</label>
                                    <input type="text" id="apellido" class="form-control" autocomplete="off">
                                </div>

                                <div class="col-12 col-md-4">
                                    <label for="telefono" class="form-label">Teléfono</label>
                                    <input type="text" id="telefono" class="form-control" autocomplete="off">
                                </div>

                                <div class="col-12 col-md-4">
                                    <label for="email" class="form-label">Email</label>
                                    <input type="email" id="email" class="form-control" autocomplete="off">
                                </div>

                                <div class="col-12 col-md-4">
                                    <label for="direccion" class="form-label">Dirección</label>
                                    <input type="text" id="direccion" class="form-control" autocomplete="off">
                                </div>
                            </div>

                            <div class="d-flex gap-2 justify-content-end mt-4">
                                <button type="button" class="btn btn-success" id="btnGuardar">Guardar</button>
                                <button type="button" class="btn btn-secondary" id="btnCancelar">Cancelar</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="panelTabla">
                    <div class="table-responsive">
                        <table id="tabla" class="table table-striped table-bordered align-middle w-100">
                            <thead class="table-dark">
                                <tr>
                                    <th>Cédula</th>
                                    <th>Nombre</th>
                                    <th>Apellido</th>
                                    <th>Teléfono</th>
                                    <th>Email</th>
                                    <th>Dirección</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>101110111</td>
                                    <td>Juan</td>
                                    <td>Pérez</td>
                                    <td>88887777</td>
                                    <td>juan@gmail.com</td>
                                    <td>Liberia, Guanacaste</td>
                                    <td></td>
                                </tr>
                                <tr>
                                    <td>202220222</td>
                                    <td>María</td>
                                    <td>Solano</td>
                                    <td>89998888</td>
                                    <td>maria@gmail.com</td>
                                    <td>Bagaces, Guanacaste</td>
                                    <td></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="js/jquery.js"></script>
    <script src="js/jquery.dataTables.min.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/crud_cliente.js"></script>

</body>

</html>
