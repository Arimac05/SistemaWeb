<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Productos</title>

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

    <div id="menu"></div>

    <div class="container my-4">
        <div class="card">
            <div class="card-body">

                <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-3 gap-2">
                    <h1 class="h3 mb-0">Productos</h1>
                    <button type="button" class="btn btn-primary" id="btnMostrarFormulario">Agregar</button>
                </div>

                <div id="panelFormulario">
                    <div class="card border mb-4">
                        <div class="card-body">
                            <h2 class="h5 mb-3" id="tituloFormulario">Nuevo producto</h2>

                            <div class="row g-3">
                                <div class="col-12 col-md-4">
                                    <label for="codigo" class="form-label">Código</label>
                                    <input type="text" id="codigo" class="form-control" autocomplete="off">
                                </div>

                                <div class="col-12 col-md-4">
                                    <label for="nombre" class="form-label">Nombre</label>
                                    <input type="text" id="nombre" class="form-control" autocomplete="off">
                                </div>

                                <div class="col-12 col-md-4">
                                    <label for="descripcion" class="form-label">Descripción</label>
                                    <input type="text" id="descripcion" class="form-control" autocomplete="off">
                                </div>

                                <div class="col-12 col-md-4">
                                    <label for="precio" class="form-label">Precio</label>
                                    <input type="number" step="0.01" min="0" id="precio" class="form-control" autocomplete="off">
                                </div>

                                <div class="col-12 col-md-4">
                                    <label for="stock" class="form-label">Stock</label>
                                    <input type="number" min="0" id="stock" class="form-control" autocomplete="off">
                                </div>

                                <div class="col-12 col-md-4">
                                    <label for="idCategoria" class="form-label">Código categoría</label>
                                    <div class="input-group">
                                        <input type="text" id="idCategoria" class="form-control" autocomplete="off">
                                        <button type="button" class="btn btn-outline-secondary" id="btnBuscarCategoria" title="Buscar categoría">🔍</button>
                                    </div>
                                </div>

                                <div class="col-12 col-md-4">
                                    <label for="nombreCategoria" class="form-label">Nombre categoría</label>
                                    <input type="text" id="nombreCategoria" class="form-control" readonly>
                                </div>
                            </div>

                            <div class="d-flex gap-2 justify-content-end mt-4">
                                <button type="button" class="btn btn-success" id="btnGuardar">Guardar</button>
                                <button type="button" class="btn btn-secondary" id="btnCancelar">Cancelar</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="panelTabla">
                    <div class="table-responsive">
                        <table id="tabla" class="table table-striped table-bordered align-middle w-100">
                            <thead class="table-dark">
                                <tr>
                                    <th>Código</th>
                                    <th>Nombre</th>
                                    <th>Descripción</th>
                                    <th>Precio</th>
                                    <th>Stock</th>
                                    <th>Categoría</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>P001</td>
                                    <td>Alimento camarón 20kg</td>
                                    <td>Saco de alimento balanceado</td>
                                    <td>15000</td>
                                    <td>40</td>
                                    <td>Alimento</td>
                                    <td></td>
                                </tr>
                                <tr>
                                    <td>P002</td>
                                    <td>Camarón entero 1kg</td>
                                    <td>Camarón fresco empacado</td>
                                    <td>6500</td>
                                    <td>120</td>
                                    <td>Camarón</td>
                                    <td></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div class="modal fade" id="modalCategorias" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title h5 mb-0">Listado de categorías</h2>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    <div class="table-responsive">
                        <table id="tablaCategorias" class="table table-striped table-bordered align-middle w-100">
                            <thead class="table-dark">
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre</th>
                                    <th>Seleccionar</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>1</td>
                                    <td>Camarón</td>
                                    <td></td>
                                </tr>
                                <tr>
                                    <td>2</td>
                                    <td>Alimento</td>
                                    <td></td>
                                </tr>
                                <tr>
                                    <td>3</td>
                                    <td>Insumo</td>
                                    <td></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/jquery.js"></script>
    <script src="js/jquery.dataTables.min.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/crud_producto.js"></script>

</body>

</html>
